packages:
  - "apps/*"
  - "packages/*"

# Exact versions, no ranges. In pnpm 11 `.npmrc` is auth/registry-only, so
# these settings live here (the `.npmrc` copy is kept for documentation but is
# no longer read by pnpm for save behaviour).
saveExact: true
savePrefix: ""

# Dependencies allowed to run install/build scripts (pnpm 11 blocks them by
# default). esbuild fetches its platform binary via its build script.
allowBuilds:
  esbuild: true
